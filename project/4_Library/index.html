<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button id="add-book-btn">+ Add Book</button>
    </header>

    <main>
        <div id="library-grid" class="library-grid">

        </div>
    </main>

    <dialog id="book-dialog">
        <form id="book-form">
            <h2>Add New Book</h2>
            
            <label for="title">Title</label>
            <input type="text" id="title" required placeholder="The Hobbit">

            <label for="author">Author</label>
            <input type="text" id="author" required placeholder="J.R.R. Tolkien">

            <label for="pages">Pages</label>
            <input type="number" id="pages" required min="1">

            <div class="checkbox-group">
                <input type="checkbox" id="readFlag">
                <label for="readFlag">I have read this book</label>
            </div>

            <div class="form-buttons">
                <button type="button" id="cancel-btn">Cancel</button>
                <button type="submit" id="submit-btn">Add to Library</button>
            </div>
        </form>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
